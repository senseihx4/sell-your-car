{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Edit User — MotorVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
  <link rel="stylesheet" href="{% static 'css/edit_user.css' %}">
</head>
<body class="edit-page-bg">

  <div class="edit-wrap">
    <a href="{% url 'dashboard' %}" class="edit-back">← Back to Dashboard</a>

    <div class="edit-card">
      <div class="edit-title">Edit User</div>
      <p class="edit-subtitle">{{ target.email }}</p>

      {% if messages %}
        {% for message in messages %}
          <div class="edit-messages">{{ message }}</div>
        {% endfor %}
      {% endif %}

      <form method="post" enctype="multipart/form-data">
        {% csrf_token %}

        <div class="edit-grid">
            <div class="field">
                <label for="first_name">First Name</label>
                <input type="text" id="first_name" name="first_name" value="{{ target.first_name|default:'' }}">
            </div>
            <div class="field">
                <label for="last_name">Last Name</label>
                <input type="text" id="last_name" name="last_name" value="{{ target.last_name|default:'' }}">
            </div>
        </div>

        <div class="field">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" value="{{ target.username|default:'' }}">
        </div>

        <div class="field">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" value="{{ target.email }}">
        </div>

        <div class="edit-grid">
            <div class="field">
                <label for="phone_number">Phone Number</label>
                <input type="number" id="phone_number" name="phone_number" value="{{ target.phone_number|default:'' }}">
            </div>
            <div class="field">
                <label for="age">Age</label>
                <input type="number" id="age" name="age" value="{{ target.age|default:'' }}">
            </div>
        </div>

        <div class="field">
            <label for="profile_picture">Profile Picture</label>
            {% if target.profile_picture %}
                <div class="current-pic-preview">
                    <img src="{{ target.profile_picture.url }}" alt="Current" style="width: 50px; height: 50px; border-radius: 50%; margin-bottom: 5px; object-fit: cover;">
                </div>
            {% endif %}
            <input type="file" id="profile_picture" name="profile_picture" accept="image/*">
        </div>

        <hr class="edit-divider">

        <div class="field">
          <div class="field-check">
            <input type="checkbox" id="is_verified" name="is_verified" {% if target.is_verified %}checked{% endif %}>
            <label for="is_verified">Email Verified</label>
          </div>
        </div>

        <div class="field">
          <div class="field-check">
            <input type="checkbox" id="is_active" name="is_active" {% if target.is_active %}checked{% endif %}>
            <label for="is_active">Account Active (uncheck to ban)</label>
          </div>
        </div>

        <div class="actions">
          <button type="submit" class="btn btn--primary">Save Changes</button>
          <a href="{% url 'dashboard' %}" class="btn btn--ghost">Cancel</a>
        </div>
      </form>
    </div>
  </div>

</body>
</html>
