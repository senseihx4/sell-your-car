{% load static %} 
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard — MotorVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'css/profile_update.css' %}">
  <style>
    .flash-msg { padding: 12px 16px; border-radius: 8px; margin-bottom: 8px; }
    .flash-msg--error   { background: #fff0f0; color: #c0392b; border: 1px solid #f5c6cb; }
    .flash-msg--success { background: #f0fff4; color: #1e7e34; border: 1px solid #c3e6cb; }
    .btn--ban   { background: #e67e22; color: #fff; border: none; }
    .btn--unban { background: #2ecc71; color: #fff; border: none; }
  </style>
</head>

  <body>


    <div class="card profile-form-card">
                <h3 class="card__title">Personal Information</h3>
                {% if form.errors %}
                    <div style="background: #fff0f0; color: #c0392b; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #f5c6cb;">
                        <strong>The form could not be saved:</strong>
                        <ul>
                        {% for field, errors in form.errors.items %}
                            <li>{{ field }}: {{ errors|striptags }}</li>
                        {% endfor %}
                        </ul>
                    </div>
                {% endif %}
                <form class="profile-form" method="POST" action="{% url 'update_profile' %}" enctype="multipart/form-data">
                {% csrf_token %}
    
                <div class="form-row">
                    <div class="field">
                    <label for="first_name">First Name</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                        <input type="text" id="first_name" name="first_name" value="{{ user.first_name }}" placeholder="First name">
                    </div>
                    </div>
                    <div class="field">
                    <label for="last_name">Last Name</label>
                    <div class="input-wrap">
                        <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 3.6-7 8-7s8 3 8 7"/></svg>
                        <input type="text" id="last_name" name="last_name" value="{{ user.last_name }}" placeholder="Last name">
                    </div>
                    </div>
                </div>
    
                <div class="field">
                    <label for="email">Email Address</label>
                    <div class="input-wrap">
                    <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/></svg>
                    <span>{{ user.email }}</span>
                    </div>
                </div>
    
                <div class="field">
                    <label for="phone_number">Phone Number</label>
                    <div class="input-wrap">
                        <svg class="input-icon">...</svg>
                         <input type="tel" 
                            id="phone_number" 
                            name="phone_number" 
                            value="{{ user.phone_number|default:'' }}" 
                            placeholder="+91 98765 43210">
                    </div>
                </div>
                                        
                 <div class="field">
                        <label for="profile_pic">Profile Photo</label>
                        <div class="file-input-wrap">
                            <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                            
                            <input type="file" id="profile_pic" name="profile_picture" accept="image/*" style="display: none;">
                            
                            <label for="profile_pic" class="file-input-label">Choose photo</label>
                        </div>
                    </div>
                        

                <button type="submit" class="btn btn--primary btn--full">Save Changes</button>
                </form>
            </div>
    
            </div>
    </body>
